    <style>
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body { 
    margin: 0; 
    font-family: Arial, sans-serif; 
    background: #0a0a0a; 
    color: #fff; 
    overflow: hidden;
    -webkit-overflow-scrolling: touch;
}





@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from {
        transform: translateY(50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes scaleUp {
    0% {
        transform: scale(0);
    }
    50% {
        transform: scale(1.1);
    }
    100% {
        transform: scale(1);
    }

/* Logout Confirmation Modal */
.logout-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    animation: fadeIn 0.3s ease;
}

.logout-modal.show {
    display: flex;
}

.logout-modal-content {
    background: linear-gradient(135deg, #1a1a2e, #2e1a1a);
    border-radius: 20px;
    padding: 40px;
    max-width: 400px;
    width: 90%;
    border: 3px solid #ff6b6b;
    box-shadow: 0 20px 60px rgba(255, 107, 107, 0.5);
    text-align: center;
    animation: slideUp 0.4s ease;
}

.logout-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    background: #ff6b6b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: scaleUp 0.5s ease;
}

.logout-icon svg {
    width: 50px;
    height: 50px;
}

.logout-title {
    font-size: 26px;
    font-weight: bold;
    color: #ff6b6b;
    margin-bottom: 15px;
}

.logout-message {
    font-size: 16px;
    color: #bfc5d2;
    margin-bottom: 30px;
}

.logout-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.logout-confirm-btn {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.logout-confirm-btn:hover {
    background: #ff5252;
    transform: scale(1.05);
}

.logout-cancel-btn {
    background: #333;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.logout-cancel-btn:hover {
    background: #555;
    transform: scale(1.05);
}

/* Video Timeline Controls */

.timeline-label {

.timeline-time {

/* toggle */

.switch {
    position: relative;
    display: inline-block;
    width: 45px;
    height: 20px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 1px;
    bottom: 2px;
    background-color: #000;
    -webkit-transition: .4s;
    transition: .4s;
}

input:checked + .slider {
  background-color: #4caf50;
}

input:focus + .slider {
  box-shadow: 0 0 1px #4caf50;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

                    <!-- Market Selection Row -->
                    <div class="market-row">
                    <div class="flag-select">
                        <div class="flag" id="platformIconClick" style="cursor: pointer;" title="Click to change platform">
                            <img id="selectedPlatformIcon" src="quotex.png" alt="Selected Platform">
                        </div>
                        <div class="market-select">
                        <label class="market-label">Market:</label>
                        <div class="select-option-1">
                            <button type="button" class="market-current" id="marketCurrent">
                                <span class="market-current-left">
                                    <span class="market-text otc-select" id="marketText">GBP/USD (OTC)</span>
                                </span>

                            </button>
                            <input type="hidden" name="market" id="marketInput" value="GBP/USD (OTC)">
                            
                            <div class="market-list" id="marketList">
                                <button class="market-item" data-value="USD/BRL (OTC)">
                                    <span class="market-text">USD/BRL (OTC)</span>                              
                                </button>
                                
                                <button class="market-item active" data-value="USD/INR (OTC)">
                                    <span class="market-text">USD/INR (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="USD/BDT (OTC)">
                                    <span class="market-text">USD/BDT (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="USD/MXN (OTC)">
                                    <span class="market-text">USD/MXN (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="USD/ARS (OTC)">
                                    <span class="market-text">USD/ARS (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="USD/PKR (OTC)">
                                    <span class="market-text">USD/PKR (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="USD/IDR (OTC)">
                                    <span class="market-text">USD/IDR (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="NZD/USD (OTC)">
                                    <span class="market-text">NZD/USD (OTC)</span>
                                </button>
                                
                                <button class="market-item" data-value="EUR/GBP (OTC)">
                                    <span class="market-text">EUR/GBP (OTC)</span>

                            </div>
                        </div>
                        <span>-</span>

                        <div class="select-option-1">
                            <button type="button" class="market-current" id="marketCurrent1">
                                <span class="market-current-left">
                                    
                                    <span class="market-text one-m" id="timeText">1M</span>
                                </span>
                                <span class="market-caret">▼</span>
                            </button>
                            <input type="hidden" name="market" id="marketInput" value="GBP/USD (OTC)">
                            
                            <div class="market-list" id="marketList-new">
                                <button class="market-item market-item-1" data-value="USD/INR (OTC)">
                                
                                    <span class="market-text">15 Sec</span>
                                </button>
                                
                                <button class="market-item market-item-1" data-value="GBP/USD (OTC)">
                                    
                                    <span class="market-text">30 Sec</span>
                                </button>
                                
                                <button class="market-item market-item-1" data-value="USD/MXN (OTC)">
                                
                                    <span class="market-text">1M</span>

                            </div>
                        </div>
                    </div>
                    </div><!-- end market-row -->
                    
                    <div class="switch-toggle">
                        <label class="switch">
                            <input type="checkbox" id="videoToggle" checked="">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="video-section">
            <video id="mainVideo" autoplay="" loop="" muted="" playsinline="">
                <source src="" type="video/mp4">
            </video>
            <div class="video-placeholder" id="videoPlaceholder">
                No video uploaded yet.<br>Click "Signal" to add one.
            </div>
            <div class="video-loading" id="videoLoading" style="display: none;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                    <div class="spinner"></div>
                    <div>Network Error</div>
                </div>
            </div>
        </div>

        <!-- Video Timeline Controls -->
        <div class="video-timeline" id="videoTimeline">
            <label class="timeline-label">⏱️ Video Timeline Control</label>
            <input type="range" class="timeline-slider" id="timelineSlider" min="0" max="100" value="0" step="0.1">
            <div class="timeline-time">
                <span id="currentTime">0:00</span>
                <span id="totalDuration">0:00</span>
            </div>
        </div>

        <div class="confidence">
            <span class="confidence-label">Confidence Level</span>
            <div class="progress-bar">
                <div class="progress" style="width: 100%;"></div>
            </div>
            <span class="confidence-value">100%</span>
        </div>

        <div class="menu-section">
            <input type="file" id="videoInput" accept="video/*" style="display: none;">
            <button class="menu-button" id="signalBtn">Signal</button>
            <button class="menu-button" id="historyBtn">History</button>
            <button class="menu-button" id="settingsBtn">Settings</button>
        </div>
    </div>
        
        <input type="file" id="videoUploadInput" accept="video/*" style="display:none;">
    </div>

    <script>
        // =================== APP INITIALIZATION ===================
        const appContainer = document.getElementById('appContainer');

        // Show app directly on load
        window.addEventListener('DOMContentLoaded', () => {
            appContainer.style.display = 'flex';
        });

        // Logout modal functionality
        const logoutModal = document.getElementById('logoutModal');
        const logoutConfirmBtn = document.getElementById('logoutConfirmBtn');
        const logoutCancelBtn = document.getElementById('logoutCancelBtn');

        document.addEventListener('DOMContentLoaded', () => {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    logoutModal.classList.add('show');
                });
            }
        });

        logoutConfirmBtn.addEventListener('click', () => {
            logoutModal.classList.remove('show');
        });

        logoutCancelBtn.addEventListener('click', () => {
            logoutModal.classList.remove('show');
        });

        // =================== MAIN APP CODE ===================
        const appHeader = document.getElementById('appHeader');

        // Check if device is mobile
        function isMobile() {
            return window.innerWidth <= 768;
        }

        // Drag functionality (desktop only)
        if (!isMobile()) {
            let dragging = false, startX, startY, startL, startT;

            const startDrag = e => {
                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startL = appContainer.offsetLeft;
                startT = appContainer.offsetTop;
                e.preventDefault();
            };

            const move = e => {
                if (dragging) {
                    appContainer.style.left = (startL + e.clientX - startX) + 'px';
                    appContainer.style.top = (startT + e.clientY - startY) + 'px';
                }
            };

            const stop = () => { dragging = false; };

            appHeader.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', stop);
        }

        // Market dropdown functionality
        const currentBtn = document.getElementById('marketCurrent');
        const currentBtn1 = document.getElementById('marketCurrent1');
        const listEl = document.getElementById('marketList');
        const listE2 = document.getElementById('marketList-new');
        const hiddenInput = document.getElementById('marketInput');
        const currentText = document.getElementById('marketCurrentText');
        const currentFlagsBox = document.getElementById('marketCurrentFlags');

        // Platform and Broker selection functionality
        const platformIconClick = document.getElementById('platformIconClick');
        const selectedPlatformIcon = document.getElementById('selectedPlatformIcon');
        const brokerModal = document.getElementById('brokerModal');
        const brokerList = document.getElementById('brokerList');
        const closeBrokerModal = document.getElementById('closeBrokerModal');
        let selectedPlatform = 'quotex';
        
        // Broker options for each platform
        const brokerOptions = {
            quotex: ['Quotex Pro', 'Quotex Standard', 'Quotex Elite', 'Quotex Premium'],
            binomo: ['Binomo Gold', 'Binomo Silver', 'Binomo VIP', 'Binomo Expert'],
            pocketoption: ['Pocket Pro', 'Pocket Standard', 'Pocket Elite', 'Pocket Premium'],
            binolla: ['Binolla Master', 'Binolla Expert', 'Binolla Advanced', 'Binolla Basic']
        };
        
        // Platform icon paths
        const platformIcons = {
            quotex: 'photo/quotex.png',
            binomo: 'photo/binomo.png',
            pocketoption: 'photo/pocketoption.jpg',
            binolla: 'photo/binolla.png'
        };
        
        // Click on flag icon to open platform selection
        platformIconClick.addEventListener('click', function() {
            showPlatformSelectionModal();
        });
        
        function showPlatformSelectionModal() {
            brokerList.innerHTML = '';
            
            // Platform names for display
            const platformNames = {
                quotex: 'Quotex',
                binomo: 'Binomo',
                pocketoption: 'Pocket Option',
                binolla: 'Binolla'
            };
            
            // Show only 4 platform options
            Object.keys(platformIcons).forEach(platform => {
                const platformItem = document.createElement('div');
                platformItem.className = 'broker-item';
                platformItem.textContent = platformNames[platform];
                
                if (platform === selectedPlatform) {
                    platformItem.classList.add('selected');
                }
                
                platformItem.addEventListener('click', function() {
                    selectPlatform(platform, platformNames[platform]);
                });
                
                brokerList.appendChild(platformItem);
            });
            
            brokerModal.classList.add('active');
        }
        
        function selectPlatform(platform, platformName) {
            selectedPlatform = platform;
            
            // Update the main flag icon
            if (selectedPlatformIcon) {
                selectedPlatformIcon.src = platformIcons[platform];
                selectedPlatformIcon.alt = platformName;
            }
            
            console.log('Selected platform:', platformName);
            
            // Close modal
            brokerModal.classList.remove('active');
        }
        
        // Close modal on X button
        closeBrokerModal.addEventListener('click', function() {
            brokerModal.classList.remove('active');
        });
        
        // Close modal on outside click
        brokerModal.addEventListener('click', function(e) {
            if (e.target === brokerModal) {
                brokerModal.classList.remove('active');
            }
        });

        // Signal button - Video upload functionality
        const signalBtn = document.getElementById('signalBtn');
        const videoInput = document.getElementById('videoInput');
        const mainVideo = document.getElementById('mainVideo');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoLoading = document.getElementById('videoLoading');

        signalBtn.addEventListener('click', function() {
            videoInput.click();
        });

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
                // Show loading
                if (videoLoading) videoLoading.style.display = 'flex';
                if (videoPlaceholder) videoPlaceholder.style.display = 'none';

                // Create object URL for the video
                const videoURL = URL.createObjectURL(file);
                
                // Set video source
                mainVideo.src = videoURL;
                mainVideo.muted = true;
                mainVideo.autoplay = true;
                mainVideo.loop = true;
                
                // Play video when loaded
                mainVideo.onloadeddata = function() {
                    if (videoLoading) videoLoading.style.display = 'none';
                    mainVideo.play().catch(err => console.log('Autoplay prevented:', err));
                };

                // Handle errors
                mainVideo.onerror = function() {
                    if (videoLoading) videoLoading.style.display = 'none';
                    if (videoPlaceholder) {
                        videoPlaceholder.style.display = 'flex';
                        videoPlaceholder.innerHTML = 'Error loading video.<br>Please try another file.';
                    }
                };
            }
        });

        // Switch toggle - Video control
        const videoToggle = document.getElementById('videoToggle');
        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const historyList = document.getElementById('historyList');
        const closeHistoryModal = document.getElementById('closeHistoryModal');
        
        // Video timeline elements
        const settingsBtn = document.getElementById('settingsBtn');
        const videoTimeline = document.getElementById('videoTimeline');
        const timelineSlider = document.getElementById('timelineSlider');
        const currentTime = document.getElementById('currentTime');
        const totalDuration = document.getElementById('totalDuration');
        
        // Format time in mm:ss
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Settings button now toggles video timeline
        settingsBtn.addEventListener('click', function() {
            videoTimeline.classList.toggle('show');
        });
        
        // Update timeline when video metadata loads
        mainVideo.addEventListener('loadedmetadata', function() {
            timelineSlider.max = mainVideo.duration;
            totalDuration.textContent = formatTime(mainVideo.duration);
        });
        
        // Update timeline as video plays
        mainVideo.addEventListener('timeupdate', function() {
            if (!timelineSlider.matches(':active')) {
                timelineSlider.value = mainVideo.currentTime;
                currentTime.textContent = formatTime(mainVideo.currentTime);
            }
        });
        
        // Seek video when slider changes
        timelineSlider.addEventListener('input', function() {
            mainVideo.currentTime = this.value;
            currentTime.textContent = formatTime(this.value);
        });
        
        videoToggle.addEventListener('change', function() {
            if (this.checked) {
                // Turn ON - Play video
                if (videoLoading) videoLoading.style.display = 'none';
                if (mainVideo.src && mainVideo.src !== '') {
                    mainVideo.play().catch(err => console.log('Play prevented:', err));
                }
            } else {
                // Turn OFF - Stop video and show loading
                mainVideo.pause();
                if (videoLoading) videoLoading.style.display = 'flex';
            }
        });

        // History Modal functionality
        historyBtn.addEventListener('click', function() {
            showHistoryModal();
        });

        function showHistoryModal() {
            historyList.innerHTML = '';
            
            // Get current selected market
            const currentMarket = document.getElementById('marketText').textContent;
            
            // Get current date and time
            const now = new Date();
            
            // Generate 200 signals - each 1 minute apart going backwards
            for (let i = 0; i < 200; i++) {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                
                // Calculate time - going back 1 minute for each entry
                const pastTime = new Date(now.getTime() - (i * 60 * 1000)); // 1 minute intervals
                const todayDate = pastTime.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = pastTime.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                });
                
                historyItem.innerHTML = `
                    <div class="history-item-header">
                        <span class="history-item-time">${todayDate} ${timeStr}</span>
                        <span class="history-item-status">WIN</span>
                    </div>
                    <div class="history-item-details">
                        <span class="history-item-pair">${currentMarket}</span>
                    </div>
                `;
                
                historyList.appendChild(historyItem);
            }
            
            historyModal.classList.add('active');
        }

        // Close history modal
        closeHistoryModal.addEventListener('click', function() {
            historyModal.classList.remove('active');
        });

        historyModal.addEventListener('click', function(e) {
            if (e.target === historyModal) {
                historyModal.classList.remove('active');
            }
        });

        currentBtn.addEventListener('click', function () {
            listEl.classList.toggle('is-open');
        });
         currentBtn1.addEventListener('click', function () {
            listE2.classList.toggle('is-open');
        });

        listEl.addEventListener('click', function (e) {
            const item = e.target.closest('.market-item');
            if (!item) return;
        
            listEl.querySelectorAll('.market-item.active')
                .forEach(el => el.classList.remove('active'));
        
            item.classList.add('active');
        
            marketText.textContent = item.dataset.value;
            marketInput.value = item.dataset.value;
        
            listEl.classList.remove('is-open');
        });



        listE2.addEventListener('click', function (e) {
            const item = e.target.closest('.market-item-1');
            if (!item) return;
        
            listE2.querySelectorAll('.market-item-1.active')
                .forEach(el => el.classList.remove('active'));
        
            item.classList.add('active');
        
            timeText.textContent = item.innerText;
            timeInput.value = item.innerText;
        
            listE2.classList.remove('is-open');
        });


        
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.select-option-1')) {
                listEl.classList.remove('is-open');
                listE2.classList.remove('is-open');
            }
        });
    </script>

</body></html>
